name: Frontend Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'jobpulse-ui/**'
      - '.github/workflows/frontend-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'jobpulse-ui/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'jobpulse-ui/package-lock.json'
      
      - name: Install dependencies
        run: cd jobpulse-ui && npm ci
      
      - name: Run Angular linting
        run: cd jobpulse-ui && npm run lint --if-present
      
      - name: Build Angular app
        run: cd jobpulse-ui && npm run build
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./jobpulse-ui
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/jobpulse-ui:latest
