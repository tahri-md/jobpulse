name: Frontend Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'jobpulse-ui/**'
      - '.github/workflows/frontend-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'jobpulse-ui/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'jobpulse-ui/package-lock.json'
      
      - name: Install dependencies
        run: cd jobpulse-ui && npm ci
      
      - name: Run Angular linting
        run: cd jobpulse-ui && npm run lint --if-present
      
      - name: Run frontend tests
        run: cd jobpulse-ui && npm test -- --no-watch --browsers=ChromeHeadless
