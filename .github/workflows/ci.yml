name: Security CI

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: jobpulse

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run Tests
        run: mvn clean verify

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: jobpulse-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: jobpulse-ui/package-lock.json

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npm run build

  pmd:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: jobpulse

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: mvn pmd:check

  spotbugs:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: jobpulse

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: mvn spotbugs:check

  trivy:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: 1
